name: 每日数据更新

on:
  schedule:
    # 北京时间 工作日 09:00 = UTC 01:00 (夏令时)
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 拉取最新基金数据
        run: python update_from_api.py

      - name: 生成页面
        run: python generate.py

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
